# Local netlify.toml for the standalone package.
#
# Netlify's monorepo detection selects this file when packages/standalone is
# chosen as the deploy project, BUT Netlify still runs commands from the
# repository root (/opt/build/repo), not from inside the package. So the
# build command must be workspace-aware (pnpm --filter ...) and the publish
# path must be relative to the repo root.
#
# This file and the repo-root netlify.toml are kept in sync deliberately.
# If you change one, change the other.

[build]
  command = "pnpm --filter @rehearsal-block/standalone build"
  publish = "packages/standalone/build"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
