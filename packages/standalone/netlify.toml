# Netlify build configuration for Rehearsal Block.
#
# Why base is set to packages/standalone:
# - @sveltejs/adapter-netlify resolves `publish` relative to svelte.config.js
#   (packages/standalone), so `publish = "build"` → packages/standalone/build.
# - Netlify resolves `publish` relative to `base`. With base = packages/standalone,
#   `publish = "build"` also → packages/standalone/build.
# - Setting base explicitly makes both tools agree.
#
# Why [functions] directory is declared:
# - adapter-netlify writes its SSR handler into .netlify/functions-internal/
#   inside packages/standalone.
# - Netlify's auto-discovery of internal functions doesn't always find them
#   when they're nested under a base directory in monorepo mode, so we point
#   Netlify at the right location explicitly.
#
# pnpm workspaces still work from this subdirectory because pnpm walks up
# the directory tree to find pnpm-workspace.yaml at the repo root.

[build]
  base = "packages/standalone"
  command = "pnpm run build"
  publish = "build"

[functions]
  directory = ".netlify/functions-internal"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10"
